<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BOM 多階層庫存查詢系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 30px; background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
    .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    #loading { display: none; }
    
    /* 縮排階層樣式設定 */
    .indent-1 { padding-left: 5px; }
    .indent-2 { padding-left: 25px; color: #495057; }
    .indent-3 { padding-left: 45px; color: #6c757d; font-style: italic; }
    .indent-4 { padding-left: 65px; color: #adb5bd; font-style: italic; }
    
    /* 庫存不足時整行變紅字與淡紅背景 */
    .row-shortage { color: #dc3545; font-weight: bold; background-color: #fdf2f2 !important; }
  </style>
</head>
<body>

<div class="container-fluid">
  <div class="row">
    <div class="col-md-4">
      <div class="card">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">BOM 庫存查詢條件</h5>
        </div>
        <div class="card-body">
          <div class="mb-3">
            <label for="searchKey" class="form-label">查詢組件（輸入品號或品名）</label>
            <input type="text" class="form-control" id="searchKey" placeholder="例如: A001">
          </div>
          <div class="mb-3">
            <label for="prodQty" class="form-label">預計生產數量</label>
            <input type="number" class="form-control" id="prodQty" value="1" min="1">
          </div>
          <button class="btn btn-success w-100" id="btnSubmit" onclick="startQuery()">開始多階層計算</button>
          
          <div id="loading" class="mt-4 text-center">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-secondary">系統正在向 Excel 撈取資料並計算中...</p>
          </div>
          <div id="resultAlert" class="alert mt-4" style="display:none;" role="alert"></div>
        </div>
      </div>
    </div>
    
    <div class="col-md-8">
      <div class="card">
        <div class="card-header bg-dark text-white">
          <h5 class="mb-0">查詢結果（資料不寫回 Excel，直接顯示於此）</h5>
        </div>
        <div class="card-body" style="overflow-x: auto;">
          <table class="table table-bordered table-striped align-middle" id="resultTable">
            <thead class="table-secondary">
              <tr>
                <th>階層</th>
                <th>母件品號</th>
                <th>母件品名</th>
                <th>子零件品號</th>
                <th>子零件品名規格</th>
                <th>單台用量</th>
                <th>單位</th>
                <th>預計總需求</th>
                <th>目前總庫存</th>
                <th>差額狀況</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr>
                <td colspan="10" class="text-center text-muted">目前尚無資料，請由左側面板點擊按鈕查詢。</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function startQuery() {
  var searchKey = document.getElementById('searchKey').value;
  var prodQty = document.getElementById('prodQty').value;
  
  var btn = document.getElementById('btnSubmit');
  var loading = document.getElementById('loading');
  var alertBox = document.getElementById('resultAlert');
  var tableBody = document.getElementById('tableBody');
  
  alertBox.style.display = 'none';
  btn.disabled = true;
  loading.style.display = 'block';
  tableBody.innerHTML = `<tr><td colspan="10" class="text-center text-muted">串接 Google Sheets 資料庫中...</td></tr>`;
  
  // 自動連線到當前的 /exec 網址後端，不需手動寫死網址
  google.script.run
    .withSuccessHandler(function(response) {
      loading.style.display = 'none';
      btn.disabled = false;
      alertBox.style.display = 'block';
      
      if(response.success) {
        alertBox.className = "alert alert-success";
        alertBox.innerText = response.msg;
        renderTable(response.data);
      } else {
        alertBox.className = "alert alert-danger";
        alertBox.innerText = response.msg;
        tableBody.innerHTML = `<tr><td colspan="10" class="text-center text-danger">錯誤：${response.msg}</td></tr>`;
      }
    })
    .withFailureHandler(function(err) {
      loading.style.display = 'none';
      btn.disabled = false;
      alertBox.style.display = 'block';
      alertBox.className = "alert alert-danger";
      alertBox.innerText = "網路連線失敗，請稍後再試。原因: " + err;
    })
    .queryBOMWithStockCheck(searchKey, prodQty);
}

function renderTable(data) {
  var tableBody = document.getElementById('tableBody');
  if(!data || data.length === 0) {
    tableBody.innerHTML = `<tr><td colspan="10" class="text-center text-muted">查無子零件明細。</td></tr>`;
    return;
  }
  
  var html = "";
  for(var i = 0; i < data.length; i++) {
    var row = data[i];
    var isShortage = row.diff < 0;
    var rowClass = isShortage ? "class='row-shortage'" : "";
    var indentClass = "indent-" + Math.min(row.level, 4);
    
    var diffText = "";
    if (row.diff > 0) {
      diffText = "滿足 +" + Number(row.diff).toLocaleString();
    } else if (row.diff === 0) {
      diffText = "剛好滿足";
    } else {
      diffText = "不足 " + Number(row.diff).toLocaleString();
    }
    
    html += `<tr ${rowClass}>
      <td>${row.level}</td>
      <td>${row.parentID}</td>
      <td>${row.parentName}</td>
      <td><div class="${indentClass}">${row.subID}</div></td>
      <td><div class="${indentClass}">${row.subName}</div></td>
      <td>${row.stdQty}</td>
      <td>${row.unit}</td>
      <td>${Number(row.totalReq).toLocaleString()}</td>
      <td>${Number(row.stockQty).toLocaleString()}</td>
      <td>${diffText}</td>
    </tr>`;
  }
  
  tableBody.innerHTML = html;
}
</script>

</body>
</html>
