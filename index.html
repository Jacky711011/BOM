<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BOM 多階層庫存查詢系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 30px; background-color: #f8f9fa; }
    .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    #loading { display: none; }
  </style>
</head>
<body>

<div class="container">
  <div class="card col-md-8 mx-auto">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">BOM 多階層生產需求與庫存查詢</h4>
    </div>
    <div class="card-body">
      
      <div class="mb-3">
        <label for="searchKey" class="form-label">查詢組件（品號或品名）</label>
        <input type="text" class="form-control" id="searchKey" placeholder="例如:A001">
      </div>
      
      <div class="mb-3">
        <label for="prodQty" class="form-label">預計生產數量</label>
        <input type="number" class="form-control" id="prodQty" value="1" min="1">
      </div>
      
      <button class="btn btn-success w-100" id="btnSubmit" onclick="startQuery()">開始計算並寫入試算表</button>
      
      <div id="loading" class="mt-4 text-center">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-secondary">系統計算中，請稍候...</p>
      </div>
      
      <div id="resultAlert" class="alert mt-4" style="display:none;" role="alert"></div>

    </div>
  </div>
</div>

<script>
function startQuery() {
  var searchKey = document.getElementById('searchKey').value;
  var prodQty = document.getElementById('prodQty').value;
  
  var btn = document.getElementById('btnSubmit');
  var loading = document.getElementById('loading');
  var alertBox = document.getElementById('resultAlert');
  
  // 隱藏舊訊息、停用按鈕、顯示 Loading
  alertBox.style.display = 'none';
  btn.disabled = true;
  loading.style.display = 'block';
  
  // 呼叫後端 Google Apps Script 函式
  google.script.run
    .withSuccessHandler(function(response) {
      loading.style.display = 'none';
      btn.disabled = false;
      
      alertBox.style.display = 'block';
      if(response.success) {
        alertBox.className = "alert alert-success";
        alertBox.innerText = response.msg;
      } else {
        alertBox.className = "alert alert-danger";
        alertBox.innerText = response.msg;
      }
    })
    .withFailureHandler(function(err) {
      loading.style.display = 'none';
      btn.disabled = false;
      alertBox.style.display = 'block';
      alertBox.className = "alert alert-danger";
      alertBox.innerText = "網頁連線失敗: " + err;
    })
    .queryBOMWithStockCheck(searchKey, prodQty);
}
</script>

</body>
</html>
